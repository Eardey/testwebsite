<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EY IT Support Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #131313;
    --bg-dim: #0e0e0e;
    --panel: #1c1b1b;
    --border: #353535;
    --text: #e5e2e1;
    --text-muted: #cdc7aa;
    --accent: #fde400;
    --accent-text: #201c00;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }

  /* Header */
  header {
    background: var(--bg-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-badge {
    width: 48px;
    height: 48px;
    background: var(--accent);
    color: var(--accent-text);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 20px;
  }
  .brand h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
  }
  header nav a {
    color: var(--text);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  header nav a:hover { color: var(--accent); }

  /* Main split layout */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 160px);
  }

  @media (min-width: 768px) {
    main { flex-direction: row; }
  }

  .intro-panel {
    flex: 1;
    background: var(--bg-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
  }

  .intro-content {
    max-width: 480px;
    text-align: center;
  }
  @media (min-width: 768px) {
    .intro-content { text-align: left; }
  }

  .intro-content h2 {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    margin: 0 0 20px;
  }
  .intro-content p {
    font-size: 18px;
    color: var(--text-muted);
    margin: 0 0 32px;
  }

  .cta-wrap {
    display: flex;
    justify-content: center;
  }
  @media (min-width: 768px) {
    .cta-wrap { justify-content: flex-start; }
  }

  .cta-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 18px 44px;
    background: var(--accent);
    color: var(--accent-text);
    font-weight: 700;
    font-size: 18px;
    text-decoration: none;
    border-radius: 999px;
    box-shadow: 0 10px 30px rgba(253, 228, 0, 0.15);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .cta-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 36px rgba(253, 228, 0, 0.25);
  }

  .image-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #2e2f35;
    min-height: 280px;
  }
  .image-panel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Footer */
  footer {
    background: var(--bg-dim);
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    margin-top: auto;
  }
  .footer-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    text-align: center;
  }
  .footer-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .footer-logo {
    width: 32px;
    height: 32px;
    background: var(--accent);
    color: var(--accent-text);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
  }
  .footer-brand span {
    color: var(--text-muted);
    font-size: 14px;
  }
  .footer-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 24px;
  }
  .footer-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s ease;
  }
  .footer-links a:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo-badge">EY</div>
      <h1>IT Support Hub</h1>
    </div>
    <nav>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="intro-panel">
    <div class="intro-content">
      <h2>Need assistance?</h2>
      <p>Browse our troubleshooting tools and technical guides to resolve issues quickly.</p>
      <div class="cta-wrap">
        <a class="cta-button" href="support.html">Troubleshooting guide</a>
      </div>
    </div>
  </section>

  <section class="image-panel">
    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkpR4fmMEP-u2Rx05YfAYu0qxTseLqkMqgoI2f_z-xJtJvbZZlqGaamYuEvyTq1SBipxLSGVy0zRjTHUSfmQs43kTLpO0mTnR2xWUsdbFFVOMZQ2UlGAs9JQ-E8bP4m43Vnik398g9vQwV749xhopnDuClEiErtWBbTKiX9-obtP07MPgivYmpOar-veKjfd2JAm4heDjHP-eId3IhGbtyL9C3OPMkzpu8XyDWwrgDJFiY0QXm9aYY7_EnA3PmAUT736k" alt="EY brand strategy">
  </section>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="footer-logo">EY</div>
      <span>© 2026 Ernst &amp; Young Global Limited. All Rights Reserved.</span>
    </div>
    <div class="footer-links">
      <a href="#">IT Policies</a>
      <a href="#">Privacy Statement</a>
      <a href="#">Terms of Use</a>
    </div>
  </div>
</footer>

</body>
</html>
